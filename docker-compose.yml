services:
  gateway-db:
    image: postgres:16
    environment:
      POSTGRES_USER: dronzer
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dronzer_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  gateway-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
