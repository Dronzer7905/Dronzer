version: '3.8'

services:
  # -------------------------
  # Core Infrastructure
  # -------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dronzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dronzer_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dronzer_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dronzer} -d ${POSTGRES_DB:-dronzer_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dronzer_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dronzer_net

  # -------------------------
  # Applications
  # -------------------------
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dronzer}:${POSTGRES_PASSWORD:-dronzer_secure_pass}@postgres:5432/${POSTGRES_DB:-dronzer_db}
      - REDIS_URL=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    ports:
      - "8000:8000"
    restart: always
    networks:
      - dronzer_net

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "dronzer.application.worker"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dronzer}:${POSTGRES_PASSWORD:-dronzer_secure_pass}@postgres:5432/${POSTGRES_DB:-dronzer_db}
      - REDIS_URL=redis://redis:6379/0
    restart: always
    networks:
      - dronzer_net

  frontend-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend-api
    environment:
      - NEXT_PUBLIC_API_URL=http://backend-api:8000
    ports:
      - "3000:3000"
    restart: always
    networks:
      - dronzer_net

  # -------------------------
  # Observability Stack
  # -------------------------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - dronzer_net

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - dronzer_net

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC
    networks:
      - dronzer_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  dronzer_net:
    driver: bridge
