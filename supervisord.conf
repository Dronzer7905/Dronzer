[supervisord]
nodaemon=true
user=dronzer
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:backend]
command=sh -c "cd /app/backend && uvicorn dronzer.presentation.api.server:create_app --factory --host 127.0.0.1 --port 8000 --workers 1"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:frontend]
command=node /app/frontend/server.js
environment=PORT=3000,HOSTNAME="127.0.0.1"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:caddy]
command=caddy run --config /app/Caddyfile
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
