apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dronzer.fullname" . }}-api
  labels:
    app.kubernetes.io/name: dronzer-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dronzer-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dronzer-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: {{ include "dronzer.fullname" . }}-secrets
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.ENVIRONMENT }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
