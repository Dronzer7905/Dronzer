apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: prompts.dronzer.io
spec:
  group: dronzer.io
  names:
    kind: Prompt
    listKind: PromptList
    plural: prompts
    singular: prompt
    shortNames:
      - prmpt
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                template:
                  type: string
                  description: "Jinja2 Prompt Template"
                version:
                  type: string
                  description: "Semantic Version Tag"
                model:
                  type: string
                  description: "Target Foundation Model (e.g. openai/gpt-4o)"
              required:
                - template
                - version
      printerColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
