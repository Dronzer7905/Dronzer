version: '3.8'

services:
  dronzer-api:
    build: 
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - POSTGRES_URL=postgresql://dronzer:devpass@postgres:5432/dronzer_dev
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app/src
    volumes:
      - ../../backend/src:/app/src
    depends_on:
      - postgres
      - redis
    command: ["uvicorn", "dronzer.presentation.api.server:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  dronzer-gateway:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=dronzer
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=dronzer_dev
    ports:
      - "5432:5432"
    volumes:
      - dronzer_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  dronzer_pg_data:
